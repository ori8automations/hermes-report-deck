name: hermes-report-deck
version: "1.1.1"
description: Hermes Dashboard browser for Markdown reports with safe folder visibility controls.
license: MIT
manifest_version: 1
# Set this after you create the GitHub repo:
# homepage: https://github.com/<owner>/hermes-report-deck

# Dashboard-only plugin; the extension lives in dashboard/.
entry_points:
  dashboard: dashboard/manifest.json

# Report Deck ships no agent tools, makes no network calls, and never writes
# report files. It only writes a small JSON folder-visibility config.
permissions:
  tools: false
  network: false
  filesystem:
    read:
      - ${HERMES_HOME}/reports
      - ${REPORT_DECK_ROOT}
    write:
      - ${HERMES_HOME}/report-deck.json
      - ${REPORT_DECK_CONFIG}

metadata:
  hermes:
    category: productivity
    tags:
      - dashboard
      - reports
      - markdown
      - read-only-reports
