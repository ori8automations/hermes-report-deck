name: hermes-report-deck
version: "1.0.0"
description: Read-only Hermes Dashboard browser for Markdown reports generated by agents or automation runs.
license: MIT
manifest_version: 1
# Set this after you create the GitHub repo:
# homepage: https://github.com/<owner>/hermes-report-deck

# Dashboard-only plugin; the extension lives in dashboard/.
entry_points:
  dashboard: dashboard/manifest.json

# Report Deck ships no agent tools, makes no network calls, and only ever
# READS Markdown files inside its configured report root.
permissions:
  tools: false
  network: false
  filesystem:
    read:
      - ${HERMES_HOME}/reports
      - ${REPORT_DECK_ROOT}
    write: []

metadata:
  hermes:
    category: productivity
    tags:
      - dashboard
      - reports
      - markdown
      - read-only
